name: build

on:
  push:
    branches:
      - main

  pull_request:

  merge_group:

  schedule:
    - cron: '0 1 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: ⚙️ Setup
        uses: containerbase/internal-tools/setup@408cc0fffe5c84ae9e03de9b514acdff407bbaad # v4.6.30
        with:
          save-cache: true

      - name: lint
        run: pnpm lint

  build:
    runs-on: ubuntu-latest

    needs:
      - lint

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          show-progress: false

      - name: binary-builder
        uses: containerbase/internal-tools@408cc0fffe5c84ae9e03de9b514acdff407bbaad # v4.6.30
        with:
          command: binary-builder
          dry-run: ${{github.ref_name != 'main'}}
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest

    concurrency:
      group: publish
      cancel-in-progress: true

    needs:
      - build

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          show-progress: false

      - name: Deploy release list to GitHub Pages
        id: deployment
        uses: containerbase/internal-tools/publish-releases@408cc0fffe5c84ae9e03de9b514acdff407bbaad # v4.6.30
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
